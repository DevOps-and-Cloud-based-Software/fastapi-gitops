name: CI/CD Pipeline

on:
  release:
    types: [published]
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run Ruff
        run: ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run pytest with coverage threshold
        run: pytest --cov-fail-under=80

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t fastapi-gitops-starter:ci .
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Tag and push release image
        if: github.event_name == 'release'
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION_TAG="${{ github.event.release.tag_name }}"
          docker tag fastapi-gitops-starter:ci "$IMAGE_NAME:$VERSION_TAG"
          docker tag fastapi-gitops-starter:ci "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$VERSION_TAG"
          docker push "$IMAGE_NAME:latest"
