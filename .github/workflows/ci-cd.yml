name: CI/CD Pipeline

on:
  release:
    types: [published]
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-fail-under=80

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize repository name (lowercase)
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ steps.repo.outputs.repo }}/fastapi-gitops-starter:${{ steps.version.outputs.VERSION }} .

      - name: Tag latest (release only)
        if: github.event_name == 'release'
        run: |
          docker tag \
            ghcr.io/${{ steps.repo.outputs.repo }}/fastapi-gitops-starter:${{ steps.version.outputs.VERSION }} \
            ghcr.io/${{ steps.repo.outputs.repo }}/fastapi-gitops-starter:latest

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/fastapi-gitops-starter:${{ steps.version.outputs.VERSION }}

      - name: Push latest tag
        if: github.event_name == 'release'
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/fastapi-gitops-starter:latest
